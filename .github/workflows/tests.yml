name: CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0

    - name: Pull the kcov image
      run: docker pull kcov/kcov

    - name: Prepare the container
      run: |
        ./test/docker-build.sh
        mkdir -p coverage

    - name: Run ShellCheck
      run: |
        shellcheck -s bash -e SC1090,SC1091 \
          dot_bashrc dot_bash_profile dot_bashrc.d/*.bash \
          run_*.sh bin/*.sh test/*.bats test/*.bash test/*.sh test/libexec/*.sh \
          perf/*.sh

    - name: Check Bash startup performance
      env:
        EVENT_NAME: ${{ github.event_name }}
        BASE_REF: ${{ github.base_ref }}
      run: |
        case "$EVENT_NAME" in
          pull_request)
            git fetch --no-tags --depth=1 origin \
              "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            base_ref="origin/${BASE_REF}"
            ;;
          push)
            if ! git rev-parse --verify HEAD^ > /dev/null; then
              echo "No parent commit available; skipping performance comparison."
              exit 0
            fi
            base_ref="HEAD^"
            ;;
          *)
            echo "Unsupported event for performance comparison: $EVENT_NAME"
            exit 0
            ;;
        esac

        perf/run-perf.sh --compare "$base_ref" HEAD --samples 3

    - name: Run the tests
      run: |
        docker run --rm --security-opt seccomp=unconfined -v ${{ github.workspace }}:/source \
          -e TERM=xterm kcov \
          /source/test/bats/bin/bats --tap /source/test
    - name: Upload coverage to Qlty
      uses: qltysh/qlty-action/coverage@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1
      with:
        token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
        format: cobertura
        files: ${{ github.workspace }}/coverage/bats/cobertura.xml
